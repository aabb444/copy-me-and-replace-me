<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>长城 AI · 知识管理</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #f5f4ed;
  --card: #ffffff;
  --card-hover: #faf9f5;
  --border: rgba(27,54,93,0.08);
  --border-light: rgba(27,54,93,0.15);
  --text: #1B365D;
  --text-dim: #4a5b78;
  --text-muted: #8a96a8;
  --accent: #1B365D;
  --accent-bg: rgba(27,54,93,0.04);
  --green: #3d6b4f;
  --red: #9d4a4a;
  --radius: 12px;
  --radius-sm: 6px;
  font-size: 17px;
}

body {
  font-family: 'EB Garamond', 'Noto Serif SC', Georgia, 'Times New Roman', serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  font-size: 17px;
  font-weight: 400;
  letter-spacing: 0.005em;
}

::selection { background: rgba(27,54,93,0.1); color: var(--text); }

.bg-layer { position: fixed; inset: 0; z-index: 0; background: var(--bg); }

.app-wrap { position: relative; z-index: 1; max-width: 1480px; margin: 0 auto; padding: 0 28px; }

header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 24px 0 20px; margin-bottom: 28px;
  border-bottom: 1px solid var(--border);
}
.logo {
  font-size: 24px;
  font-weight: 600;
  color: var(--text);
  letter-spacing: -0.3px;
}
.header-right { display: flex; align-items: center; gap: 16px; }
.header-badge {
  font-size: 12px; color: var(--text-dim);
  background: var(--card);
  border: 1px solid var(--border);
  padding: 4px 16px; border-radius: 40px;
  font-weight: 500;
}

.main-grid { display: grid; grid-template-columns: 400px 1fr; gap: 20px; align-items: start; }

.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px 22px;
  margin-bottom: 16px;
}
.card:hover { border-color: var(--border-light); }

.card-h {
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 14px;
  font-size: 12px; font-weight: 600; color: var(--text-muted);
  letter-spacing: 0.5px; text-transform: uppercase;
}

.input-row { display: flex; gap: 10px; }
.input-f {
  flex: 1;
  background: rgba(27,54,93,0.02);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text);
  padding: 11px 14px;
  font-size: 16px;
  outline: none;
  transition: all .15s;
  font-family: inherit;
  font-weight: 400;
}
.input-f::placeholder { color: var(--text-muted); font-style: italic; }
.input-f:focus { border-color: rgba(27,54,93,0.25); }
.input-ta { resize: vertical; min-height: 60px; line-height: 1.6; }

.btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 11px 22px; border: none; border-radius: 6px;
  font-size: 15px; font-weight: 500; cursor: pointer;
  transition: all .12s; font-family: inherit;
}
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover { background: #243f6b; }
.btn-secondary { background: rgba(27,54,93,0.06); color: var(--text); border: 1px solid var(--border); }
.btn-secondary:hover { background: rgba(27,54,93,0.08); }

.btn-icon {
  width: 32px; height: 32px; border-radius: 6px;
  background: transparent; border: 1px solid var(--border);
  color: var(--text-dim); cursor: pointer; font-size: 17px;
  display: inline-flex; align-items: center; justify-content: center;
}
.btn-icon:hover { border-color: var(--border-light); color: var(--text); }
.btn-tiny {
  background: transparent; border: 1px solid var(--border);
  color: var(--text-dim); font-size: 12px; padding: 4px 14px;
  border-radius: 6px; cursor: pointer; font-family: inherit;
}
.btn-tiny:hover { color: var(--text); border-color: var(--border-light); }

.cal-nav { display: flex; align-items: center; gap: 8px; margin-left: auto; }
.cal-title {
  min-width: 110px; text-align: center; font-weight: 500; font-size: 16px;
  color: var(--text);
}
.cal-tbl { width: 100%; border-collapse: collapse; }
.cal-tbl th {
  font-size: 11px; color: var(--text-muted); font-weight: 500;
  padding: 6px 0 8px; text-align: center; text-transform: uppercase; letter-spacing: 0.3px;
}
.cal-tbl td {
  text-align: center; padding: 5px 0; cursor: pointer;
  border-radius: 6px; position: relative; width: 14.28%;
}
.cal-tbl td:hover { background: rgba(27,54,93,0.03); }

.day-num {
  display: inline-flex; align-items: center; justify-content: center;
  width: 30px; height: 30px; font-size: 15px; border-radius: 50%;
}
.cal-tbl td.today .day-num { background: var(--accent); color: #fff; }
.cal-tbl td.sel .day-num { background: rgba(27,54,93,0.06); border: 1px solid var(--accent); }
.day-dot {
  position: absolute; top: 0; right: calc(50% - 16px);
  background: var(--accent); color: #fff; font-size: 8px;
  border-radius: 10px; padding: 0 6px; line-height: 14px; min-width: 14px; text-align: center;
}

.day-detail {
  margin-top: 10px; padding: 14px 16px;
  background: rgba(27,54,93,0.02);
  border-radius: 6px; border: 1px solid var(--border);
  font-size: 15px; color: var(--text-dim); line-height: 1.7;
}
.day-detail strong { color: var(--text); font-weight: 500; }
.time-tag {
  font-size: 12px; color: var(--text-dim);
  background: rgba(27,54,93,0.04);
  padding: 1px 8px; border-radius: 3px;
}

.task-list { max-height: 360px; overflow-y: auto; }
.task-item {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 10px 0; border-bottom: 1px solid rgba(27,54,93,0.04);
  border-radius: 4px; transition: all .12s;
}
.task-item:last-child { border-bottom: none; }
.task-item:hover { background: rgba(27,54,93,0.02); margin: 0 -4px; padding: 10px 4px; }
.task-item.done { opacity: .2; transition: opacity .4s; }

.tk-chk {
  flex-shrink: 0; width: 20px; height: 20px;
  border: 1.5px solid var(--green); border-radius: 50%;
  background: transparent; color: var(--green); font-size: 11px;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  margin-top: 2px; transition: all .12s;
}
.tk-chk:hover { background: var(--green); color: #fff; }
.tk-bd { flex: 1; }
.tk-tl { font-size: 17px; font-weight: 400; }
.tk-meta { display: flex; gap: 8px; font-size: 13px; color: var(--text-muted); margin-top: 1px; }
.tk-date, .tk-time { background: rgba(27,54,93,0.03); padding: 0 7px; border-radius: 3px; }

.tag-cloud { display: flex; flex-wrap: wrap; gap: 5px; }
.tag {
  display: inline-flex; align-items: center; gap: 4px;
  border-radius: 20px; padding: 4px 13px;
  cursor: pointer; transition: all .12s; font-size: 14px;
  border: 1px solid;
}
.tag:hover { filter: brightness(1.08); }
.tag.act { outline: 2px solid var(--accent); outline-offset: 2px; }
.tag-c { font-size: 12px; border-radius: 10px; padding: 0 7px; line-height: 18px; opacity: .7; }

.note-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(270px, 1fr)); gap: 12px; }

/* ═══ chat ═══ */
.chat-panel { display: flex; flex-direction: column; max-height: 480px; min-height: 280px; }
.chat-msgs { flex: 1; overflow-y: auto; padding: 4px 2px; display: flex; flex-direction: column; gap: 8px; }
.chat-msg { padding: 8px 12px; border-radius: 6px; font-size: 15px; line-height: 1.6; max-width: 88%; }
.chat-msg.user { background: rgba(27,54,93,0.04); align-self: flex-end; border: 1px solid rgba(27,54,93,0.06); }
.chat-msg.assistant { background: transparent; align-self: flex-start; color: var(--text); }
.chat-msg.thinking { font-size: 13px; color: var(--text-muted); font-style: italic; align-self: flex-start; padding: 4px 12px; animation: pulse 1.5s ease-in-out infinite; }
@keyframes pulse { 0%,100%{opacity:0.5} 50%{opacity:1} }
.chat-inp { display: flex; gap: 8px; margin-top: 10px; padding-top: 12px; border-top: 1px solid var(--border); }
.note-c {
  background: rgba(27,54,93,0.01);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 16px 18px;
  cursor: pointer; transition: all .15s;
}
.note-c:hover { background: var(--card-hover); border-color: var(--border-light); }
.note-c-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 8px; }
.note-c-tag { font-size: 12px; color: var(--text-dim); background: rgba(27,54,93,0.03); padding: 2px 9px; border-radius: 10px; }
.note-c-title {
  font-size: 17px; font-weight: 500; margin-bottom: 6px;
  line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2;
  -webkit-box-orient: vertical; overflow: hidden;
}
.note-c-preview {
  font-size: 14px; color: var(--text-dim); line-height: 1.6;
  display: -webkit-box; -webkit-line-clamp: 3;
  -webkit-box-orient: vertical; overflow: hidden;
}
.note-c-foot { display: flex; justify-content: space-between; margin-top: 8px; font-size: 12px; color: var(--text-muted); }

.modal-o {
  position: fixed; inset: 0; z-index: 100;
  background: rgba(245,244,237,0.85); backdrop-filter: blur(6px);
  display: flex; align-items: center; justify-content: center;
  animation: fi .15s;
}
@keyframes fi { from { opacity: 0; } to { opacity: 1; } }
.modal-c {
  background: #fff; border: 1px solid var(--border);
  border-radius: 14px; width: 80%; max-width: 680px;
  max-height: 82vh; overflow-y: auto; padding: 32px 36px;
  animation: mi .2s;
}
@keyframes mi { from { transform: scale(.98); opacity: 0; } to { transform: scale(1); opacity: 1; } }
.modal-c h2 { font-size: 24px; margin-bottom: 12px; padding-right: 50px; font-weight: 500; }
.modal-close {
  float: right; background: transparent;
  border: 1px solid var(--border); color: var(--text-dim);
  padding: 6px 16px; border-radius: 6px; cursor: pointer; font-size: 14px; font-family: inherit;
}
.modal-close:hover { color: var(--text); border-color: var(--border-light); }
.modal-tags { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 16px; }
.modal-tag { font-size: 14px; color: var(--text-dim); background: rgba(27,54,93,0.03); padding: 3px 11px; border-radius: 12px; }
.modal-body {
  background: rgba(27,54,93,0.02); border: 1px solid var(--border);
  padding: 20px 22px; border-radius: 8px;
  font-size: 16px; line-height: 1.8; white-space: pre-wrap;
  word-wrap: break-word; color: var(--text-dim);
}

.toast {
  position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
  padding: 10px 24px; border-radius: 8px; font-size: 15px;
  z-index: 200; transition: all .25s;
}
.toast.ok { background: #fff; color: var(--green); border: 1px solid rgba(61,107,79,0.2); }
.toast.err { background: #fff; color: var(--red); border: 1px solid rgba(157,74,74,0.2); }
.toast.hid { opacity: 0; transform: translateX(-50%) translateY(12px); pointer-events: none; }

.empty { padding: 24px; text-align: center; color: var(--text-muted); font-size: 15px; font-style: italic; }
.badge { background: rgba(27,54,93,0.04); color: var(--text-dim); font-size: 12px; border-radius: 10px; padding: 0 8px; line-height: 20px; min-width: 20px; text-align: center; }

::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(27,54,93,0.06); border-radius: 2px; }

@media (max-width: 900px) {
  .main-grid { grid-template-columns: 1fr; }
  .note-grid { grid-template-columns: 1fr; }
  .app-wrap { padding: 0 16px; }
}
</style>
</head>
<body>

<div class="bg-layer"></div>
<div class="app-wrap">

  <!-- ═══ HEADER ═══ -->
  <header>
    <div class="logo">长城 AI · 知识管理</div>
    <div class="header-right">
      <span class="header-badge">Claude Opus 4.8</span>
    </div>
  </header>

  <!-- ═══ GRID ═══ -->
  <div class="main-grid">

    <!-- ═══ LEFT ═══ -->
    <div class="left-column">

      <div class="card">
        <div class="card-h"><span class="icon gold">📋</span> 任务</div>
        <form id="taskForm" class="input-row">
          <input type="text" id="taskInput" class="input-f"
            placeholder="明天下午3点开会讨论Q2的AI芯片选型进度...">
          <button type="submit" class="btn btn-primary" id="taskBtn">+</button>
        </form>
      </div>

      <div class="card">
        <div class="card-h"><span class="icon gold">📝</span> 笔记</div>
        <form id="noteForm" class="input-row" style="flex-direction:column">
          <textarea id="noteInput" class="input-f input-ta" rows="2"
            placeholder="今天测试了DeepSeek-R1的推理速度..."></textarea>
          <button type="submit" class="btn btn-secondary" id="noteBtn" style="align-self:flex-end">+ 记录</button>
        </form>
      </div>

      <div class="card">
        <div class="card-h">
          <span class="icon gold">📅</span>
          <div class="cal-nav">
            <button class="btn-icon" onclick="M.change(-1)">‹</button>
            <span class="cal-title" id="calTitle">June 2025</span>
            <button class="btn-icon" onclick="M.change(1)">›</button>
            <button class="btn-tiny" onclick="M.today()">Today</button>
          </div>
        </div>
        <table class="cal-tbl">
          <thead><tr><th>Sun</th><th>Mon</th><th>Tue</th><th>Wed</th><th>Thu</th><th>Fri</th><th>Sat</th></tr></thead>
          <tbody id="calBody"></tbody>
        </table>
        <div id="dayDetail"></div>
      </div>

      <div class="card">
        <div class="card-h"><span class="icon gold">✓</span> Tasks <span class="badge" id="taskBadge">0</span></div>
        <div class="task-list" id="taskList"><div class="empty">No tasks</div></div>
      </div>

    </div>

    <!-- ═══ RIGHT ═══ -->
    <div class="right-column">

      <div class="card">
        <div class="card-h"><span class="icon gold">#</span> Tags <span class="badge" id="tagBadge">0</span></div>
        <div class="tag-cloud" id="tagCloud"><div class="empty">No tags yet</div></div>
      </div>

      <div class="card">
        <div class="card-h"><span class="icon" style="font-size:13px">💬</span> Local Chat <span class="badge" id="modelBadge">qwen35-moe</span>
          <span style="margin-left:auto;display:flex;gap:4px">
            <button class="btn-tiny" onclick="saveChatAsNote()" id="saveChatBtn" title="Save chat as note">📝 Save</button>
            <button class="btn-tiny" onclick="clearChat()">Clear</button>
          </span>
        </div>
        <div class="chat-panel">
          <div class="chat-msgs" id="chatMsgs">
            <div class="chat-msg assistant">Hello — how can I help you today?</div>
          </div>
          <div style="padding:4px 0;font-size:11px;color:var(--text-muted);display:flex;gap:6px;align-items:center;flex-wrap:wrap">
            <label style="display:flex;align-items:center;gap:4px;cursor:pointer">
              <input type="checkbox" id="ragToggle" checked> <span>RAG</span>
            </label>
            <button class="btn-tiny" onclick="reindexVault()" id="reindexBtn">Index</button>
            <span style="color:var(--border-light);margin:0 2px">|</span>
            <button class="btn-tiny" id="modelFastBtn" onclick="switchModel('qwen35-moe')" style="background:rgba(27,54,93,0.06);font-weight:500">[Quick] 34B</button>
            <button class="btn-tiny" id="modelDeepBtn" onclick="switchModel('qwen3.5-122b')">[Deep] 122B</button>
          </div>
          <div class="chat-inp">
            <input type="text" id="chatInput" class="input-f" placeholder="Ask the local model..."
              onkeydown="if(event.key==='Enter') sendChat()">
            <button class="btn btn-primary" onclick="sendChat()" id="chatBtn" style="padding:11px 18px">→</button>
          </div>
        </div>
      </div>

      <div class="card" style="flex:1">
        <div class="card-h">
          <span class="icon gold">📄</span>
          <span id="notesTitle">All Notes</span>
          <span class="badge" id="notesBadge">0</span>
          <div style="margin-left:auto;display:flex;gap:4px">
            <button class="btn-tiny" onclick="M.allNotes()">All</button>
          </div>
        </div>
        <div class="note-grid" id="noteGrid"><div class="empty">Loading...</div></div>
      </div>

    </div>

  </div>
</div>

<div id="toast" class="toast hid"></div>

<script>
const API = (() => {
  function r(url, opts) { return fetch(url, opts).then(res => res.json()); }
  return {
    taskAdd: t => r('/api/task', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({text:t})}),
    taskDone: id => r(`/api/task/${id}/complete`, {method:'PATCH'}),
    tasks: () => r('/api/tasks/active'),
    cal: (y,m) => r(`/api/calendar?year=${y}&month=${m}`),
    tasksByDate: d => r(`/api/tasks/date?date=${d}`),
    noteAdd: t => r('/api/note', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({text:t})}),
    notes: () => r('/api/notes/all'),
    notesByTag: tag => r(`/api/notes?tag=${encodeURIComponent(tag)}`),
    tags: () => r('/api/tags'),
    noteGet: f => r(`/api/note/${encodeURIComponent(f)}`),
  };
})();

const M = (() => {
  let cy = new Date().getFullYear(), cm = new Date().getMonth() + 1;
  let atag = null;
  let nc = [];

  function t(m, type) {
    const el = document.getElementById('toast');
    el.textContent = m; el.className = 'toast ' + type;
    clearTimeout(el._t); el._t = setTimeout(() => el.classList.add('hid'), 3000);
  }

  function lb(id, v) {
    document.getElementById(id).disabled = v;
    document.getElementById(id).textContent = v ? '...' : (id === 'taskBtn' ? '+' : '+ Record');
  }

  document.getElementById('taskForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    const inp = document.getElementById('taskInput');
    const txt = inp.value.trim(); if (!txt) return;
    lb('taskBtn', true);
    const d = await API.taskAdd(txt);
    lb('taskBtn', false);
    if (d.success) { t('Task added', 'ok'); inp.value = ''; reload(); }
    else t(d.error||'Failed', 'err');
  });

  window.completeTask = async function(id) {
    const el = document.querySelector(`.task-item[data-id="${id}"]`);
    if (el) el.classList.add('done');
    const d = await API.taskDone(id);
    if (d.success) { t('Done', 'ok'); setTimeout(() => { if(el)el.remove(); reload(); }, 300); }
    else { t('Failed', 'err'); if(el)el.classList.remove('done'); }
  };

  async function reloadTasks() {
    const tasks = await API.tasks();
    const list = document.getElementById('taskList');
    document.getElementById('taskBadge').textContent = tasks.length;
    if (!tasks.length) { list.innerHTML = '<div class="empty">No tasks</div>'; return; }
    list.innerHTML = tasks.map(t =>
      `<div class="task-item" data-id="${t.id}"><button class="tk-chk" onclick="completeTask('${t.id}')">✓</button><div class="tk-bd"><div class="tk-tl">${esc(t.title)}</div><div class="tk-meta"><span class="tk-date">${t.date}</span>${t.time ? `<span class="tk-time">${t.time}</span>` : ''}</div></div></div>`
    ).join('');
  }

  document.getElementById('noteForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    const inp = document.getElementById('noteInput');
    const txt = inp.value.trim(); if (!txt) return;
    lb('noteBtn', true);
    const d = await API.noteAdd(txt);
    lb('noteBtn', false);
    if (d.success) { t('Note saved', 'ok'); inp.value = ''; Promise.all([reloadTags(), reloadNotes()]); }
    else t(d.error||'Failed', 'err');
  });

  async function reloadNotes() {
    atag = null;
    document.querySelectorAll('.tag').forEach(el => el.classList.remove('act'));
    document.getElementById('notesTitle').textContent = 'All Notes';
    const notes = await API.notes();
    nc = notes; renderNotes(notes);
  }
  window.M_allNotes = reloadNotes;

  function renderNotes(notes) {
    const grid = document.getElementById('noteGrid');
    document.getElementById('notesBadge').textContent = notes.length;
    if (!notes.length) { grid.innerHTML = '<div class="empty">No notes</div>'; return; }
    grid.innerHTML = notes.map(n => {
      const tags = n.tags || [];
      return `<div class="note-c" onclick="showNote('${esc(n.filename)}')"><div class="note-c-tags">${tags.slice(0,5).map(t => `<span class="note-c-tag">#${esc(t)}</span>`).join('')}${tags.length>5?`<span class="note-c-tag">+${tags.length-5}</span>`:''}</div><div class="note-c-title">${esc(n.title||n.filename)}</div><div class="note-c-preview">${esc((n.preview||'').slice(0,150))}</div><div class="note-c-foot"><span>${n.date||''}</span><span>note</span></div></div>`;
    }).join('');
  }

  window.showNote = async function(filename) {
    const note = await API.noteGet(filename);
    if (!note || note.error) { t('Not found', 'err'); return; }
    const c = note.content || '';
    const p = c.split('---');
    let body = c, meta = {};
    if (p.length >= 3) { meta = fm(p[1]); body = p.slice(2).join('---').trim(); }
    const tags = meta.tags || [];
    const ov = document.createElement('div');
    ov.className = 'modal-o';
    ov.innerHTML = `<div class="modal-c"><button class="modal-close" onclick="this.closest('.modal-o').remove()">Close</button><h2>${esc(meta.title||filename)}</h2><div class="modal-tags">${tags.map(t => `<span class="modal-tag">#${esc(t)}</span>`).join('')}</div><div style="font-size:12px;color:var(--text-muted);margin-bottom:12px">${meta.date||''} &middot; ${meta.type||'note'}</div><div class="modal-body">${esc(body)}</div></div>`;
    ov.addEventListener('click', function(e) { if (e.target===this) this.remove(); });
    document.body.appendChild(ov);
  };

  function fm(f) {
    const m = {}; let k = null;
    f.split('\n').forEach(l => {
      const li = l.match(/^\s{2}-\s(.+)/);
      if (li && k) { if(!m[k]) m[k]=[]; m[k].push(li[1].trim()); return; }
      const kv = l.match(/^(\w+):\s?(.+)?$/);
      if (kv) { k = kv[1]; const v = kv[2] ? kv[2].trim() : null;
        if (v) { if(v.startsWith('[')){ try{m[k]=JSON.parse(v.replace(/'/g,'"'))}catch(e){m[k]=v} } else m[k] = v; } }
    });
    return m;
  }

  async function reloadTags() {
    const tagsData = await API.tags();
    const cloud = document.getElementById('tagCloud');
    document.getElementById('tagBadge').textContent = Object.keys(tagsData).length;
    if (!Object.keys(tagsData).length) { cloud.innerHTML = '<div class="empty">No tags</div>'; return; }
    const tagColors = ['#1B365D','#3d6b4f','#8b6b3d','#6b4f7a','#3d6b7a','#8b4f4f','#4f6b3d','#6b6b4f'];
    let ci = 0;
    cloud.innerHTML = Object.entries(tagsData).map(([tag, info]) => {
      const c = tagColors[ci % tagColors.length]; ci++;
      const related = (info.related_tags||[]).slice(0,6).join(', ');
      return `<div class="tag${atag===tag?' act':''}" data-tag="${esc(tag)}" onclick="M.filter('${esc(tag)}')" data-related="${esc(related)}"
        style="background:${c}12;border-color:${c}30;color:${c}"
        title="Related tags: ${related}">
        #${esc(tag)}<span class="tag-c" style="background:${c}15">${info.count}</span></div>`;
    }).join('');
  }

  window.filterByTag = async function(tag) {
    if (atag === tag) {
      // deselect
      atag = null;
      document.querySelectorAll('.tag').forEach(el => {
        el.classList.remove('act');
        el.style.borderStyle = 'solid';
      });
      document.getElementById('notesTitle').textContent = 'All Notes';
      renderNotes(nc);
      return;
    }
    atag = tag;
    // 获取关联标签
    const el = document.querySelector(`.tag[data-tag="${esc(tag)}"]`);
    const relatedSet = new Set((el?.dataset.related||'').split(',').map(s => s.trim()).filter(Boolean));

    document.querySelectorAll('.tag').forEach(el => {
      if (el.dataset.tag === tag) {
        el.classList.add('act');
        el.style.borderStyle = 'solid';
      } else if (relatedSet.has(el.dataset.tag)) {
        // 关联标签：半高亮 + 虚线边框
        el.classList.remove('act');
        el.style.borderStyle = 'dashed';
        el.style.opacity = '0.85';
      } else {
        el.classList.remove('act');
        el.style.borderStyle = 'solid';
        el.style.opacity = '0.4';
      }
    });
    document.getElementById('notesTitle').textContent = '# ' + tag;
    const notes = await API.notesByTag(tag);
    renderNotes(notes);
  };

  async function loadCal() {
    const cal = await API.cal(cy, cm);
    document.getElementById('calTitle').textContent = cal.month_name + ' ' + cal.year;
    document.getElementById('calBody').innerHTML = cal.weeks.map(w =>
      '<tr>' + w.map(d => {
        if (!d) return '<td></td>';
        const cls = [];
        if (d.is_today) cls.push('today');
        if (d.count > 0) cls.push('has');
        return `<td class="${cls.join(' ')}" data-date="${d.date}" onclick="M.select('${d.date}')"><span class="day-num">${d.day}</span>${d.count > 0 ? `<span class="day-dot">${d.count}</span>` : ''}</td>`;
      }).join('') + '</tr>'
    ).join('');
  }

  window.selectDate = async function(dateStr) {
    document.querySelectorAll('.cal-tbl td').forEach(td => td.classList.remove('sel'));
    document.querySelectorAll(`.cal-tbl td[data-date="${dateStr}"]`).forEach(td => td.classList.add('sel'));
    const data = await API.tasksByDate(dateStr);
    const all = [...(data.active||[]), ...(data.archived||[])];
    document.getElementById('dayDetail').innerHTML = all.length
      ? `<div class="day-detail"><strong>${dateStr}</strong> &mdash; ${all.length} item(s)<br>${all.map(t => `${t.status==='completed'?'✅':'⬜'} ${t.time?`<span class="time-tag">${t.time}</span>`:''} ${esc(t.title)}`).join('<br>')}</div>`
      : `<div class="day-detail"><strong>${dateStr}</strong><br>No tasks</div>`;
  };

  async function reload() { await Promise.all([reloadTasks(), loadCal(), reloadTags(), reloadNotes()]); }

  // ═══ CHAT ═══
  const chatMsgs = [];
  function addChatMsg(role, text) {
    const div = document.createElement('div');
    div.className = 'chat-msg ' + role;
    div.textContent = text;
    document.getElementById('chatMsgs').appendChild(div);
    div.scrollIntoView({ behavior: 'smooth' });
    chatMsgs.push({ role, content: text });
  }

  window.clearChat = function() {
    chatMsgs.length = 0;
    document.getElementById('chatMsgs').innerHTML = '<div class="chat-msg assistant">Hello — how can I help you today?</div>';
  };

  window.saveChatAsNote = async function() {
    if (chatMsgs.length === 0) return;
    const btn = document.getElementById('saveChatBtn');
    btn.textContent = 'Saving...';
    const text = chatMsgs.map(m => (m.role === 'user' ? '> ' : '') + m.content).join('\n\n');
    const title = (chatMsgs[0]?.content || 'Chat').slice(0, 40);
    try {
      const r = await fetch('/api/note-from-chat', {
        method: 'POST', headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({title, content: text}),
      });
      const d = await r.json();
      if (d.success) { t('Chat saved as note', 'ok'); reloadNotes(); }
      else t('Failed', 'err');
    } catch(e) { t('Error', 'err'); }
    btn.textContent = 'Save';
  };

  // current model
  let currentModel = 'qwen35-moe';

  window.switchModel = function(model) {
    currentModel = model;
    document.getElementById('modelBadge').textContent = model;
    document.getElementById('modelFastBtn').style.background = model === 'qwen35-moe' ? 'rgba(27,54,93,0.06)' : 'transparent';
    document.getElementById('modelDeepBtn').style.background = model === 'qwen3.5-122b' ? 'rgba(27,54,93,0.06)' : 'transparent';
    document.getElementById('modelFastBtn').style.fontWeight = model === 'qwen35-moe' ? '500' : '400';
    document.getElementById('modelDeepBtn').style.fontWeight = model === 'qwen3.5-122b' ? '500' : '400';
    t(`Switched to ${model === 'qwen35-moe' ? 'Quick (34B)' : 'Deep (122B)'}`, 'ok');
    clearChat();
  };

  window.reindexVault = async function() {
    const btn = document.getElementById('reindexBtn');
    btn.textContent = 'Indexing...';
    try {
      const r = await fetch('/api/index-vault', {method:'POST'});
      const d = await r.json();
      t(`Indexed ${d.indexed||0} chunks`, 'ok');
    } catch(e) { t('Error', 'err'); }
    btn.textContent = 'Index';
  };

  window.sendChat = async function() {
    const inp = document.getElementById('chatInput');
    const txt = inp.value.trim();
    if (!txt) return;
    inp.value = '';
    addChatMsg('user', txt);

    const msgs = document.getElementById('chatMsgs');
    const think = document.createElement('div');
    think.className = 'chat-msg thinking';
    think.textContent = 'thinking...';
    msgs.appendChild(think);

    const btn = document.getElementById('chatBtn');
    btn.disabled = true;
    const useRag = document.getElementById('ragToggle').checked;

    try {
      const resp = await fetch('/api/chat', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({messages: chatMsgs, model: currentModel, use_rag: useRag}),
      });

      think.remove();

      const bubble = document.createElement('div');
      bubble.className = 'chat-msg assistant';
      msgs.appendChild(bubble);

      const reader = resp.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        buffer += decoder.decode(value, {stream: true});
        const lines = buffer.split('\n');
        buffer = lines.pop() || '';

        for (const line of lines) {
          if (!line.startsWith('data: ')) continue;
          try {
            const data = JSON.parse(line.slice(6));
            if (data.text) {
              bubble.textContent += data.text;
              bubble.scrollIntoView({ behavior: 'smooth' });
            }
          } catch(e) {}
        }
      }

      chatMsgs.push({role: 'assistant', content: bubble.textContent});
    } catch(e) {
      think.remove();
      addChatMsg('assistant', '[Connection error]');
    }
    btn.disabled = false;
  };

  const pub = {
    allNotes: reloadNotes,
    filter: window.filterByTag,
    select: window.selectDate,
    today() { const n=new Date(); cy=n.getFullYear(); cm=n.getMonth()+1; loadCal(); },
    change(d) { cm+=d; if(cm>12){cm=1;cy++;} if(cm<1){cm=12;cy--;} loadCal(); },
  };
  Object.assign(window, { M: pub, completeTask: window.completeTask, showNote: window.showNote });

  function esc(s) { if(!s) return ''; const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }

  document.addEventListener('DOMContentLoaded', () => { reload(); });

  return pub;
})();
</script>
</body>
</html>
